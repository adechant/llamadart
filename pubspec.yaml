name: llamadart
description: A Dart/Flutter plugin for llama.cpp - run LLM inference on any platform using GGUF models
version: 0.6.4
homepage: https://github.com/leehack/llamadart
repository: https://github.com/leehack/llamadart
issue_tracker: https://github.com/leehack/llamadart/issues
topics:
  - llama
  - llm
  - ai
  - inference
  - gguf

environment:
  sdk: ^3.10.7

dependencies:
  archive: ^4.0.7
  ffi: ^2.1.0
  path: ^1.8.3
  http: ^1.1.0
  web: ^1.0.0
  logging: ^1.3.0
  dinja: ^1.0.0

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.26.3

analyzer:
  exclude:
    - "lib/src/llama_cpp.dart"

ffigen: # dart run ffigen
  name: "llama_cpp"
  description: "llama.cpp binding"
  output: "lib/src/backends/generated/llama_cpp.dart"
  # ignore-source-errors: true
  headers:
    entry-points:
      - "include/mtmd.h"
      - "include/mtmd-helper.h"
      - "include/log.h"

  compiler-opts:
    - "-I/usr/lib/clang/17/include"

flutter:
  plugin:
    platforms:
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      android:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
